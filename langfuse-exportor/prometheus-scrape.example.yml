# Add this job to your existing Prometheus (e.g. the one on port 29090).
# Reload or restart Prometheus after editing prometheus.yml.

scrape_configs:
  - job_name: langfuse-exporter
    scrape_interval: 60s
    static_configs:
      # Exporter on the same Mac as Prometheus (default compose port):
      - targets: ["host.docker.internal:29100"]
      # If Prometheus runs on the host (not in Docker), use instead:
      # - targets: ["localhost:29100"]
